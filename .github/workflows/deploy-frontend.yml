name: Deploy Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      HAS_CLOUDFLARE_CONFIG: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Skip Cloudflare deploy
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || env.HAS_CLOUDFLARE_CONFIG != 'true'
        run: |
          {
            echo "### Cloudflare deploy skipped"
            echo
            echo "The frontend build passed. Deployment only runs for pushes to main when both GitHub secrets are configured:"
            echo
            echo "- CLOUDFLARE_API_TOKEN"
            echo "- CLOUDFLARE_ACCOUNT_ID"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CLOUDFLARE_CONFIG == 'true'
        working-directory: frontend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy dist --project-name docuflow-ocr --branch main
